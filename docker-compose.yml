version: '3.8'

services:
  mysql:
    image: mysql:8.0.36
    container_name: mysql-pinyin
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: duynv94
      MYSQL_DATABASE: pinyincentreV1
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.2
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: